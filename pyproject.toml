[tool.black]
line-length = 100
target-version = ["py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.venv
  | data
  | logs
  | lightning_logs
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", "data", "logs", "lightning_logs"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
  "E501",  # line length is enforced by black
  "B008",  # FastAPI's Depends(...) in defaults is idiomatic
  # Pre-existing debt from the first lint pass (2026-07-04), tracked in TODO.md:
  # fixing these needs per-callsite judgment, not a mechanical rewrite.
  "B904",  # raise-without-from-inside-except (~40 call sites)
  "B905",  # zip-without-explicit-strict (~20 call sites)
  "B019",  # lru_cache on an instance method (single call site, bounded maxsize)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811"]
# Standalone scripts that mutate sys.path before importing app.* modules.
"scripts/*" = ["E402"]
"app/forecasting/provider_worker.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
files = ["app", "scripts"]
exclude = ["\\.venv", "data", "logs", "lightning_logs"]
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true

# Modules with pre-existing type errors as of the first mypy pass (2026-07-04),
# tracked in TODO.md. New/modified modules are expected to be clean; pay this
# debt down incrementally rather than silencing it repo-wide.
