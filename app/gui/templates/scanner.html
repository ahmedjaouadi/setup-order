{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <div>
    <h1>Scanner</h1>
    <p class="subtitle">Etat runtime, univers, filtres liquidite et dernier passage du scanner.</p>
  </div>
  <div class="runtime">
    <button type="button" id="v2-scanner-run">Run</button>
    <button type="button" id="v2-scanner-pause">Pause</button>
    <button type="button" id="v2-scanner-resume">Resume</button>
  </div>
</section>

<section class="content-grid two-col">
  <div class="panel">
    <div class="panel-heading">
      <h2>Status</h2>
    </div>
    <div class="v2-kpi-grid" id="v2-scanner-status"></div>
  </div>
  <div class="panel">
    <div class="panel-heading">
      <h2>Config</h2>
    </div>
    <pre class="config-view compact" id="v2-scanner-config"></pre>
  </div>
</section>
{% endblock %}
